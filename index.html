<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f1a">
  <title>健身计时</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ── HOME ── -->
<div id="view-home" class="view">
  <div class="header">
    <h1>💪 健身计时</h1>
  </div>

  <div class="stats-row">
    <div class="stat-chip">
      <div class="val" id="home-week-count">0</div>
      <div class="lbl">本周训练</div>
    </div>
    <div class="stat-chip">
      <div class="val" id="home-total-count">0</div>
      <div class="lbl">累计次数</div>
    </div>
  </div>

  <div class="section-label">选择训练部位</div>
  <div class="bodypart-grid" id="bodypart-grid"></div>

  <div class="section-label" style="margin-bottom:8px;">打卡记录</div>
  <div class="cal-grid" id="home-calendar"></div>

  <div class="section-header" style="margin-top:24px;">
    <div class="section-label" style="margin-bottom:0">最近记录</div>
    <button class="btn-link" id="btn-all-history">全部</button>
  </div>
  <div id="home-history"></div>

  <div class="btn-stack" style="margin-top: 24px;">
    <button class="btn btn-primary" id="btn-start-setup" disabled>开始配置训练</button>
  </div>
</div>

<!-- ── SETUP ── -->
<div id="view-setup" class="view">
  <div class="header">
    <button class="back-btn" id="btn-setup-back">←</button>
    <h1 id="setup-title">配置训练</h1>
  </div>

  <div class="section-label">快速模板</div>
  <div class="templates-row" id="templates-row"></div>

  <div class="section-header">
    <div class="section-label">选择动作（可多选）</div>
    <button class="btn-link" id="btn-edit-exercises">管理</button>
  </div>
  <div class="exercise-list" id="exercise-list"></div>
  <div id="add-exercise-row">
    <input type="text" id="add-ex-input" class="add-ex-input" placeholder="输入动作名称" maxlength="20">
    <button class="btn-add-ex" id="btn-confirm-add-ex">＋ 添加</button>
  </div>

  <div class="btn-stack">
    <button class="btn btn-primary" id="btn-begin-workout" disabled>开始训练</button>
  </div>
</div>

<!-- ── ACTIVE ── -->
<div id="view-active" class="view">
  <div class="active-header">
    <span class="part-badge" id="active-part-badge"></span>
    <span class="timer-small" id="active-timer-elapsed">00:00</span>
    <button id="btn-voice-toggle" title="语音开启" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 6px;">🔊</button>
    <button id="btn-pause" class="btn-pause-icon" title="暂停">⏸</button>
    <button class="back-btn" id="btn-active-back" style="background:none;font-size:14px;width:auto;border-radius:8px;padding:4px 8px;color:var(--text-dim);">结束</button>
  </div>

  <div class="progress-dots" id="active-progress-dots"></div>

  <div class="exercise-card">
    <div class="ex-label" id="active-ex-label"></div>
    <div class="ex-title" id="active-ex-title"></div>
    <div class="set-info" id="active-set-info"></div>
    <div class="last-hint" id="last-hint"></div>

    <div class="set-log-row">
      <div class="log-field">
        <span class="log-lbl">重量</span>
        <input type="number" id="log-weight" class="log-input" placeholder="—" min="0" max="999" step="0.5" inputmode="decimal">
        <span class="log-unit">kg</span>
      </div>
      <div class="log-divider"></div>
      <div class="log-field">
        <span class="log-lbl">次数</span>
        <input type="number" id="log-reps" class="log-input" placeholder="—" min="1" max="99" step="1" inputmode="numeric">
        <span class="log-unit">次</span>
      </div>
    </div>

    <!-- Set countdown ring (shown only when duration > 0) -->
    <div id="set-timer-display" style="display:none; margin-top:16px;">
      <div style="position:relative;width:90px;height:90px;margin:0 auto;">
        <svg width="90" height="90" viewBox="0 0 90 90" style="transform:rotate(-90deg)">
          <circle cx="45" cy="45" r="36" fill="none" stroke="var(--surface2)" stroke-width="6"/>
          <circle id="set-ring-progress" cx="45" cy="45" r="36" fill="none"
                  stroke="var(--accent)" stroke-width="6" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span id="set-timer-seconds" style="font-size:24px;font-weight:700;color:var(--accent);">0</span>
          <span style="font-size:10px;color:var(--text-dim);">秒</span>
        </div>
      </div>
    </div>
  </div>

  <div class="section-label">接下来</div>
  <div class="upcoming-list" id="active-upcoming-list"></div>

  <div class="btn-stack">
    <button class="btn btn-primary" id="btn-complete-set">✓ 完成这组</button>
  </div>
</div>

<!-- ── REST ── -->
<div id="view-rest" class="view">
  <div class="rest-label">休息中</div>
  <div class="rest-next" id="rest-next-label"></div>

  <div class="countdown-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle id="ring-bg" class="ring-bg" cx="110" cy="110" r="96"/>
      <circle id="ring-progress" class="ring-progress" cx="110" cy="110" r="96"/>
    </svg>
    <div class="countdown-number">
      <div class="seconds" id="rest-seconds">60</div>
      <div class="unit">秒</div>
    </div>
  </div>

  <div class="rest-btn-row">
    <button class="btn btn-ghost" id="btn-add-30">+30s</button>
    <button class="btn btn-ghost" id="btn-pause-rest">⏸</button>
    <button class="btn btn-primary" id="btn-skip-rest">跳过 →</button>
  </div>
</div>

<!-- ── DONE ── -->
<div id="view-done" class="view">
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <div class="done-emoji">🎉</div>
    <div class="done-title">训练完成！</div>
    <div class="done-sub">你真棒，保持这个节奏！</div>

    <div class="done-stats">
      <div class="done-stat">
        <div class="val" id="done-sets">0</div>
        <div class="lbl">完成组数</div>
      </div>
      <div class="done-stat">
        <div class="val" id="done-exercises">0</div>
        <div class="lbl">动作数</div>
      </div>
      <div class="done-stat">
        <div class="val" id="done-mins">0</div>
        <div class="lbl">分钟</div>
      </div>
    </div>
  </div>

  <div class="done-btn-row">
    <button class="btn btn-primary" id="btn-done-again">再练一次</button>
    <button class="btn btn-secondary" id="btn-done-home">返回首页</button>
  </div>
</div>

<!-- ── HISTORY ── -->
<div id="view-history" class="view">
  <div class="header">
    <button class="back-btn" id="btn-history-back">←</button>
    <h1>全部记录</h1>
  </div>
  <div id="history-full-list"></div>
</div>

<!-- ── Pause Overlay ── -->
<div id="pause-overlay" class="pause-overlay" style="display:none;">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-label">已暂停</div>
    <button class="btn btn-primary" id="btn-resume" style="margin-top:24px;">▶ 继续训练</button>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
